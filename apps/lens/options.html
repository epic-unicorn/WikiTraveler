<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WikiTraveler Lens — Settings</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 420px; margin: 32px auto; padding: 0 20px; color: #111827; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 20px 0 6px; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    button { margin-top: 16px; background: #1e3a5f; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; cursor: pointer; font-weight: 600; }
    #status { font-size: 13px; color: #059669; margin-top: 10px; }
    .hint { font-size: 12px; color: #6b7280; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>🌍 WikiTraveler Lens</h1>
  <p style="color:#6b7280;font-size:14px">Configure the node your Lens connects to.</p>
  <label for="nodeUrl">Node URL</label>
  <input id="nodeUrl" type="url" placeholder="http://localhost:3000" />
  <p class="hint">The base URL of your WikiTraveler node (no trailing slash).</p>
  <button id="save">Save</button>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
