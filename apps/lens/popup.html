<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WikiTraveler Lens</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      min-height: 200px;
      margin: 0;
      background: #f9fafb;
      color: #111827;
    }
    header {
      background: #1e3a5f;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 { font-size: 15px; font-weight: 700; margin: 0; }
    #content { padding: 16px; }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      margin-left: 4px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    td { padding: 6px 4px; border-bottom: 1px solid #f3f4f6; }
    .empty { color: #9ca3af; text-align: center; padding: 24px 0; font-size: 13px; }
    .property-id { font-size: 11px; color: #9ca3af; margin-bottom: 12px; word-break: break-all; }
    a { color: #1e3a5f; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <span style="font-size:20px">🌍</span>
    <h1>WikiTraveler Lens</h1>
  </header>
  <div id="content">
    <p style="color:#9ca3af;font-size:13px">Loading…</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
