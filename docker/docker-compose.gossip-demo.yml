# Two-node gossip demo
# Usage: docker compose -f docker/docker-compose.gossip-demo.yml up
#
# After startup:
#   1. Submit a community audit to node-a:
#      curl -s -X POST http://localhost:3000/api/auth/token \
#           -H "Content-Type: application/json" \
#           -d '{"passphrase":"demo"}' | jq .token
#      TOKEN=<paste>
#      curl -X POST http://localhost:3000/api/properties/<id>/accessibility \
#           -H "Content-Type: application/json" \
#           -H "Authorization: Bearer $TOKEN" \
#           -d '{"facts":[{"fieldName":"ramp_present","value":"yes"}]}'
#
#   2. Wait 10 seconds, then check node-b:
#      curl http://localhost:3001/api/properties/<id>/accessibility
#
#   Verify MESH_TRUTH promotion when both nodes report the same fact.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wikitraveler
      POSTGRES_PASSWORD: wikitraveler
      POSTGRES_DB: wikitraveler
    volumes:
      - gossip_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikitraveler"]
      interval: 5s
      timeout: 5s
      retries: 10

  node-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://wikitraveler:wikitraveler@postgres:5432/wikitraveler
      NODE_ID: node-a
      NODE_URL: http://node-a:3000
      COMMUNITY_PASSPHRASE: demo
      JWT_SECRET: demo-secret-a
      CORS_ORIGINS: "*"
      # Gossip every 10 seconds for demo — use hours in production
      GOSSIP_INTERVAL_HOURS: "0.003"
      SEED_NODES: "http://node-b:3001"
      NODE_ENV: production

  node-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://wikitraveler:wikitraveler@postgres:5432/wikitraveler_b
      NODE_ID: node-b
      NODE_URL: http://node-b:3001
      PORT: "3001"
      COMMUNITY_PASSPHRASE: demo
      JWT_SECRET: demo-secret-b
      CORS_ORIGINS: "*"
      GOSSIP_INTERVAL_HOURS: "0.003"
      SEED_NODES: "http://node-a:3000"
      NODE_ENV: production

  # Gossip scheduler — polls /api/cron/gossip on each node every 10 seconds
  gossip-scheduler:
    image: curlimages/curl:8.7.1
    restart: unless-stopped
    depends_on:
      - node-a
      - node-b
    entrypoint: >
      sh -c "
        sleep 15 &&
        while true; do
          echo '--- gossip tick ---';
          curl -s http://node-a:3000/api/cron/gossip | head -c 200;
          echo '';
          curl -s http://node-b:3001/api/cron/gossip | head -c 200;
          echo '';
          sleep 10;
        done
      "

volumes:
  gossip_postgres_data:
